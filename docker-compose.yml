# `name` gives this stack its own Compose project namespace with dedicated
# service names, network and persisted data.
name: shieldai

services:
  dashboard:
    build:
      context: .
    image: shieldai/local:dev
    container_name: shieldai-dashboard
    command: ["python", "backend/app.py"]
    environment:
      SHIELDAI_BIND_HOST: 0.0.0.0
    ports:
      # Bind only to the host loopback interface: this is a local desktop
      # gateway, not a service exposed to the office network.
      - "127.0.0.1:18787:8787"
    volumes:
      - shieldai-data:/app/data
    networks:
      - shieldai-net
    init: true
    restart: unless-stopped
    healthcheck:
      # /api/policy is a lightweight endpoint that proves the dashboard and
      # local policy layer are both available.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/policy')"]
      interval: 10s
      timeout: 3s
      retries: 5

  mcp:
    image: shieldai/local:dev
    container_name: shieldai-mcp
    command: ["python", "backend/mcp_http.py"]
    environment:
      SHIELDAI_BIND_HOST: 0.0.0.0
      SHIELDAI_DASHBOARD_ORIGIN: http://127.0.0.1:18787
    ports:
      - "127.0.0.1:18765:8765"
    volumes:
      - shieldai-data:/app/data
    networks:
      - shieldai-net
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  shieldai-net:
    name: shieldai_net
    driver: bridge

volumes:
  shieldai-data:
    name: shieldai_data
